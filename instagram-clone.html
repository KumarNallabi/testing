<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<style>
  :root{
    --bg:#fafafa;
    --card:#ffffff;
    --border:#dbdbdb;
    --text:#262626;
    --text-secondary:#8e8e8e;
    --link:#00376b;
    --accent:#0095f6;
    --accent-hover:#1877f2;
    --heart-red:#ed4956;
    --story-grad: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  a{text-decoration:none;color:inherit;}
  button{font-family:inherit;cursor:pointer;}

  /* ---------- HEADER ---------- */
  header{
    position:sticky; top:0; z-index:100;
    background:var(--card);
    border-bottom:1px solid var(--border);
  }
  .header-inner{
    max-width:975px;
    margin:0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:60px;
    padding:0 20px;
  }
  .logo{
    font-family:'Brush Script MT', cursive;
    font-size:28px;
    font-weight:600;
    letter-spacing:0.5px;
  }
  .search-box{
    display:flex;
    align-items:center;
    background:#efefef;
    border-radius:8px;
    padding:8px 12px;
    width:268px;
    color:var(--text-secondary);
    font-size:14px;
    gap:8px;
  }
  .search-box input{
    border:none;background:transparent;outline:none;width:100%;font-size:14px;
  }
  .header-icons{
    display:flex;
    align-items:center;
    gap:22px;
  }
  .header-icons svg{width:24px;height:24px;display:block;}
  .header-icons .icon-btn{
    background:none;border:none;padding:0;display:flex;align-items:center;
  }
  .avatar-small{
    width:24px;height:24px;border-radius:50%;object-fit:cover;
    background:linear-gradient(135deg,#f9ce34,#ee2a7b,#6228d7);
  }
  @media (max-width:600px){
    .search-box{display:none;}
  }

  /* ---------- LAYOUT ---------- */
  .layout{
    max-width:975px;
    margin:0 auto;
    display:grid;
    grid-template-columns:1fr 320px;
    gap:28px;
    padding:24px 20px;
  }
  @media (max-width:850px){
    .layout{grid-template-columns:1fr; max-width:630px;}
    .sidebar{display:none;}
  }

  /* ---------- STORIES ---------- */
  .stories{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    padding:16px 0;
    margin-bottom:24px;
    display:flex;
    gap:16px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .stories::-webkit-scrollbar{display:none;}
  .story{
    flex:0 0 auto;
    width:74px;
    text-align:center;
    cursor:pointer;
  }
  /* .story .ring{
    width:66px;height:66px;border-radius:50%;
    background:var(--story-grad);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 6px;
  } */
  .story.seen .ring{ background:#c7c7c7; }
  .story .ring img{
    width:60px;height:60px;border-radius:50%;
    object-fit:cover;
    border:3px solid var(--card);
  }
  .story span{
    font-size:12px;
    color:var(--text);
    display:block;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  /* ---------- POST CARD ---------- */
  .post{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:8px;
    margin-bottom:24px;
  }
  .post-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
  }
  .post-header .user-info{display:flex;align-items:center;gap:10px;}
  .post-header img.avatar{
    width:32px;height:32px;border-radius:50%;object-fit:cover;
  }
  .post-header .uname{font-size:14px;font-weight:600;}
  .post-header .loc{font-size:12px;color:var(--text-secondary); display:block;}
  .more-btn{background:none;border:none;padding:4px;}
  .more-btn svg{width:18px;height:18px;}

  .post-media{
    width:100%;
    aspect-ratio: 1 / 1;
    overflow:hidden;
    position:relative;
    user-select:none;
    background:#f0f0f0;
  }
  .post-media img{
    width:100%;height:100%;object-fit:cover;display:block;
  }
  .heart-pop{
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:100px;height:100px;
    pointer-events:none;
    opacity:0;
  }
  .heart-pop svg{width:100%;height:100%;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25));}
  .heart-pop.animate{
    animation: heartPop .9s ease;
  }
  @keyframes heartPop{
    0%{transform:translate(-50%,-50%) scale(0); opacity:0;}
    15%{transform:translate(-50%,-50%) scale(1.2); opacity:1;}
    30%{transform:translate(-50%,-50%) scale(0.95); opacity:1;}
    45%{transform:translate(-50%,-50%) scale(1.05); opacity:1;}
    80%{transform:translate(-50%,-50%) scale(1); opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1); opacity:0;}
  }

  .post-actions{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px 0;
  }
  .action-left{display:flex; gap:14px;}
  .action-btn{
    background:none;border:none;padding:4px;
  }
  .action-btn svg{
    width:24px;height:24px;
    stroke:var(--text);
    fill:none;
    transition:transform .15s ease;
  }
  .action-btn:active svg{ transform:scale(0.85); }
  .action-btn.liked svg{ fill:var(--heart-red); stroke:var(--heart-red); }
  .action-btn.saved svg{ fill:var(--text); }

  .post-likes{
    padding:8px 16px 0;
    font-size:14px;
    font-weight:600;
  }
  .post-caption{
    padding:6px 16px 0;
    font-size:14px;
    line-height:18px;
  }
  .post-caption .uname{font-weight:600; margin-right:5px;}
  .post-comments-link{
    padding:6px 16px 0;
    font-size:14px;
    color:var(--text-secondary);
    display:block;
  }
  .post-comments-link.hidden-link{display:none;}
  .comments-list{ padding:6px 16px 0; }
  .comment-item{ font-size:14px; line-height:18px; margin-bottom:4px;}
  .comment-item .uname{font-weight:600;margin-right:5px;}
  .post-time{
    padding:8px 16px 0;
    font-size:11px;
    color:var(--text-secondary);
    text-transform:uppercase;
    letter-spacing:.2px;
  }
  .add-comment{
    display:flex;
    align-items:center;
    border-top:1px solid var(--border);
    margin-top:12px;
    padding:4px 16px;
  }
  .add-comment input{
    flex:1;
    border:none;
    outline:none;
    padding:10px 0;
    font-size:14px;
  }
  .add-comment button{
    background:none;border:none;
    color:var(--accent);
    font-weight:600;
    font-size:14px;
    opacity:.4;
    pointer-events:none;
  }
  .add-comment button.active{opacity:1;pointer-events:auto;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{ padding-top:10px; }
  .profile-card{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:22px;
  }
  .profile-card img{
    width:56px;height:56px;border-radius:50%;object-fit:cover;
  }
  .profile-card .pname{font-weight:600; font-size:14px;}
  .profile-card .phandle{color:var(--text-secondary); font-size:14px;}
  .profile-card .switch{
    margin-left:auto;
    color:var(--accent);
    font-size:12px;
    font-weight:600;
    background:none;border:none;
  }
  .suggestions-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .suggestions-head span:first-child{
    color:var(--text-secondary);
    font-weight:600;
    font-size:14px;
  }
  .suggestions-head button{
    background:none;border:none;
    font-size:12px;
    font-weight:600;
  }
  .suggestion-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
  }
  .suggestion-row img{
    width:32px;height:32px;border-radius:50%;object-fit:cover;
  }
  .suggestion-row .sname{font-size:14px;font-weight:600;}
  .suggestion-row .sreason{font-size:12px;color:var(--text-secondary);}
  .suggestion-row .follow-btn{
    margin-left:auto;
    background:none;border:none;
    color:var(--accent);
    font-size:12px;
    font-weight:600;
  }
  .suggestion-row .follow-btn.following{ color:var(--text); }

  .footer-links{
    margin-top:28px;
    font-size:11px;
    color:#c7c7c7;
    line-height:18px;
  }
  .footer-links span{margin-right:6px;}
  .footer-credit{ margin-top:14px; font-size:11px; color:#c7c7c7; letter-spacing:.5px;}

  /* ---------- STORY MODAL ---------- */
  .story-modal{
    position:fixed; inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
  }
  .story-modal.open{ display:flex; }
  .story-modal-content{
    width:400px; max-width:92vw;
    aspect-ratio:9/16;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    background:#000;
  }
  .story-modal-content img{
    width:100%;height:100%;object-fit:cover;
  }
  .story-modal-top{
    position:absolute; top:0; left:0; right:0;
    padding:14px 12px;
    display:flex; align-items:center; gap:10px;
    background:linear-gradient(180deg, rgba(0,0,0,.5), transparent);
  }
  .story-modal-top .bar{
    position:absolute; top:8px; left:12px; right:12px;
    height:2px; background:rgba(255,255,255,.35);
    border-radius:2px; overflow:hidden;
  }
  .story-modal-top .bar-fill{
    height:100%; width:0%; background:#fff;
    animation: storyProgress 4s linear forwards;
  }
  @keyframes storyProgress{ to{ width:100%; } }
  .story-modal-top img{
    width:28px;height:28px;border-radius:50%;
    margin-top:8px;
    object-fit:cover;
  }
  .story-modal-top span{ color:#fff; font-size:13px; font-weight:600; margin-top:8px;}
  .story-close{
    position:absolute; top:14px; right:14px;
    background:none; border:none; z-index:5;
    margin-top:0 !important;
  }
  .story-close svg{ width:26px;height:26px; stroke:#fff; fill:none; filter:drop-shadow(0 0 3px rgba(0,0,0,.6)); }
  .story-nav{
    position:absolute; top:0; bottom:0; width:50%;
    background:transparent; border:none;
  }
  .story-nav.prev{ left:0; }
  .story-nav.next{ right:0; }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:#ddd; border-radius:4px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Instagram</div>
    <div class="search-box">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Search" />
    </div>
    <div class="header-icons">
      <button class="icon-btn" title="Home">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 23h-6.001a1 1 0 0 1-1-1v-5.455a2.997 2.997 0 1 0-5.998 0V22a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V11.543a1 1 0 0 1 .31-.724l10-9.543a1 1 0 0 1 1.38 0l10 9.543a1 1 0 0 1 .31.724V22a1 1 0 0 1-1 1Z"/></svg>
      </button>
      <button class="icon-btn" title="Messages">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M12 2c5.523 0 10 3.976 10 8.883a7.911 7.911 0 0 1-3.5 6.494V22l-3.845-2.113a11.9 11.9 0 0 1-2.655.3c-5.523 0-10-3.976-10-8.883C2 5.976 6.477 2 12 2Z"/></svg>
      </button>
      <button class="icon-btn" title="Notifications">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M16.792 3.904A4.989 4.989 0 0 1 21.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.438-.283-1.79-1.51-4.303-3.752C5.152 14.081 2.5 12.194 2.5 9.122a4.989 4.989 0 0 1 4.708-5.218 4.21 4.21 0 0 1 3.675 1.941c.283.42.475.885.577 1.376.102-.49.294-.956.577-1.376a4.208 4.208 0 0 1 3.755-1.941Z"/></svg>
      </button>
      <button class="icon-btn" title="Create">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" fill="none"><path d="M2 12v3.45c0 2.849 0 4.274.925 5.199C3.85 21.574 5.275 21.574 8.124 21.574h7.752c2.849 0 4.274 0 5.199-.925.925-.925.925-2.35.925-5.199V12M12 3v13m0-13-4 4m4-4 4 4"/></svg>
      </button>
      <img class="avatar-small" id="myAvatar" title="Profile" src="https://i.pravatar.cc/40?img=12" />
    </div>
  </div>
</header>

<div class="layout">
  <main>
    <div class="stories" id="storiesRow"></div>
    <div id="feed"></div>
  </main>

  <aside class="sidebar">
    <div class="profile-card">
      <img src="https://i.pravatar.cc/100?img=12" />
      <div>
        <div class="pname">jane_doe</div>
        <div class="phandle">Jane Doe</div>
      </div>
      <button class="switch">Switch</button>
    </div>

    <div class="suggestions-head">
      <span>Suggested for you</span>
      <button>See All</button>
    </div>
    <div id="suggestions"></div>

    <div class="footer-links">
      <span>About</span><span>Help</span><span>Press</span><span>API</span><span>Jobs</span><span>Privacy</span><span>Terms</span><span>Locations</span><span>Language</span>
    </div>
    <div class="footer-credit">© 2026 INSTACLONE</div>
  </aside>
</div>

<div class="story-modal" id="storyModal">
  <div class="story-modal-content" id="storyModalContent">
    <div class="story-modal-top">
      <div class="bar"><div class="bar-fill" id="storyBarFill"></div></div>
      <img id="storyModalAvatar" src="" />
      <span id="storyModalName"></span>
    </div>
    <img id="storyModalImg" src="" />
    <button class="story-close" id="storyCloseBtn">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="story-nav prev" id="storyPrevBtn"></button>
    <button class="story-nav next" id="storyNextBtn"></button>
  </div>
</div>

<script>
/* ---------------- DATA ---------------- */
const stories = [
  {name:"Your story", avatar:"https://i.pravatar.cc/100?img=12", seen:false, mine:true},
  {name:"marco_r", avatar:"https://i.pravatar.cc/100?img=51", seen:false},
  {name:"lily.k", avatar:"https://i.pravatar.cc/100?img=32", seen:false},
  {name:"denver_co", avatar:"https://i.pravatar.cc/100?img=15", seen:true},
  {name:"foodie_sam", avatar:"https://i.pravatar.cc/100?img=22", seen:false},
  {name:"travel.now", avatar:"https://i.pravatar.cc/100?img=45", seen:true},
  {name:"nina_art", avatar:"https://i.pravatar.cc/100?img=28", seen:false},
  {name:"ben_codes", avatar:"https://i.pravatar.cc/100?img=8", seen:true},
];

const posts = [
  {
    id:1, user:"marco_r", avatar:"https://i.pravatar.cc/100?img=51", loc:"Dolomites, Italy",
    image:"https://picsum.photos/id/1018/900/900",
    likes:2431, liked:false, saved:false,
    caption:"Chasing sunrises above the clouds this morning ⛰️",
    comments:[{u:"lily.k",t:"This is unreal 😍"},{u:"foodie_sam",t:"Take me with you next time"}],
    time:"4 HOURS AGO"
  },
  {
    id:2, user:"foodie_sam", avatar:"https://i.pravatar.cc/100?img=22", loc:"Downtown Bistro",
    image:"https://picsum.photos/id/292/900/900",
    likes:958, liked:false, saved:false,
    caption:"Sunday brunch done right 🍳🥐",
    comments:[{u:"nina_art",t:"That plating!!"}],
    time:"6 HOURS AGO"
  },
  {
    id:3, user:"nina_art", avatar:"https://i.pravatar.cc/100?img=28", loc:"Studio",
    image:"https://picsum.photos/id/1025/900/900",
    likes:5820, liked:true, saved:true,
    caption:"New pup, new muse 🐾 say hi to Biscuit",
    comments:[{u:"ben_codes",t:"BISCUIT!! 😭❤️"},{u:"marco_r",t:"the cutest thing I've seen all week"},{u:"travel.now",t:"need a dog like this"}],
    time:"9 HOURS AGO"
  },
  {
    id:4, user:"travel.now", avatar:"https://i.pravatar.cc/100?img=45", loc:"Santorini, Greece",
    image:"https://picsum.photos/id/1039/900/900",
    likes:12034, liked:false, saved:false,
    caption:"Blue domes, bluer water 🇬🇷",
    comments:[{u:"lily.k",t:"Adding this to the list"}],
    time:"1 DAY AGO"
  },
];

const suggestedUsers = [
  {name:"harper_j", reason:"Followed by ben_codes", avatar:"https://i.pravatar.cc/100?img=5", following:false},
  {name:"studio.light", reason:"Suggested for you", avatar:"https://i.pravatar.cc/100?img=19", following:false},
  {name:"the.wanderer", reason:"New to Instagram", avatar:"https://i.pravatar.cc/100?img=36", following:false},
  {name:"cafe.culture", reason:"Followed by nina_art", avatar:"https://i.pravatar.cc/100?img=41", following:false},
  {name:"petsofinsta", reason:"Suggested for you", avatar:"https://i.pravatar.cc/100?img=60", following:false},
];

const heartOutline = `<path d="M12.001 4.529a5.998 5.998 0 0 1 8.485 8.485L12 21.5l-8.486-8.486a5.998 5.998 0 1 1 8.485-8.485h.002Z" stroke-width="1.8"/>`;
const heartFilled = `<path d="M12.001 4.529a5.998 5.998 0 0 1 8.485 8.485L12 21.5l-8.486-8.486a5.998 5.998 0 1 1 8.485-8.485h.002Z"/>`;
const bookmarkOutline = `<polygon points="20 21 12 16 4 21 4 3 20 3 20 21" stroke-width="1.8"/>`;
const bookmarkFilled = `<path d="M4 3h16v18l-8-5-8 5V3Z"/>`;

/* ---------------- RENDER STORIES ---------------- */
const storiesRow = document.getElementById('storiesRow');
stories.forEach((s, idx) => {
  const el = document.createElement('div');
  el.className = 'story' + (s.seen ? ' seen' : '');
  el.innerHTML = `<div class="ring"><img src="${s.avatar}"></div><span>${s.mine ? 'Your story' : s.name}</span>`;
  el.addEventListener('click', () => openStory(idx));
  storiesRow.appendChild(el);
});

/* ---------------- STORY MODAL ---------------- */
let currentStory = 0;
const storyModal = document.getElementById('storyModal');
const storyModalImg = document.getElementById('storyModalImg');
const storyModalAvatar = document.getElementById('storyModalAvatar');
const storyModalName = document.getElementById('storyModalName');
const storyBarFill = document.getElementById('storyBarFill');
let storyTimer = null;

function openStory(idx){
  currentStory = idx;
  showStory();
  storyModal.classList.add('open');
}
function showStory(){
  const s = stories[currentStory];
  storyModalAvatar.src = s.avatar;
  storyModalName.textContent = s.mine ? 'Your story' : s.name;
  // reuse post images for variety
  const imgs = ["https://picsum.photos/id/1015/500/900","https://picsum.photos/id/1035/500/900","https://picsum.photos/id/1041/500/900","https://picsum.photos/id/1050/500/900","https://picsum.photos/id/1060/500/900","https://picsum.photos/id/1074/500/900","https://picsum.photos/id/1080/500/900","https://picsum.photos/id/109/500/900"];
  storyModalImg.src = imgs[currentStory % imgs.length];
  s.seen = true;
  document.querySelectorAll('.story')[currentStory].classList.add('seen');
  storyBarFill.style.animation = 'none';
  void storyBarFill.offsetWidth;
  storyBarFill.style.animation = 'storyProgress 4s linear forwards';
  clearTimeout(storyTimer);
  storyTimer = setTimeout(nextStory, 4000);
}
function nextStory(){
  if(currentStory < stories.length - 1){ currentStory++; showStory(); }
  else closeStory();
}
function prevStory(){
  if(currentStory > 0){ currentStory--; showStory(); }
}
function closeStory(){
  storyModal.classList.remove('open');
  clearTimeout(storyTimer);
}
document.getElementById('storyCloseBtn').addEventListener('click', closeStory);
document.getElementById('storyNextBtn').addEventListener('click', nextStory);
document.getElementById('storyPrevBtn').addEventListener('click', prevStory);
document.getElementById('myAvatar').addEventListener('click', () => openStory(0));

/* ---------------- RENDER FEED ---------------- */
const feed = document.getElementById('feed');

function formatLikes(n){
  return n.toLocaleString('en-US');
}

function renderPost(p){
  const wrap = document.createElement('div');
  wrap.className = 'post';
  wrap.innerHTML = `
    <div class="post-header">
      <div class="user-info">
        <img class="avatar" src="${p.avatar}">
        <div>
          <span class="uname">${p.user}</span>
          <span class="loc">${p.loc}</span>
        </div>
      </div>
      <button class="more-btn"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></button>
    </div>
    <div class="post-media">
      <img src="${p.image}" draggable="false">
      <div class="heart-pop"><svg viewBox="0 0 24 24" fill="#fff">${heartFilled}</svg></div>
    </div>
    <div class="post-actions">
      <div class="action-left">
        <button class="action-btn like-btn ${p.liked ? 'liked' : ''}"><svg viewBox="0 0 24 24" stroke="currentColor">${p.liked ? heartFilled : heartOutline}</svg></button>
        <button class="action-btn comment-btn"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M20.656 17.008a9.993 9.993 0 1 0-3.59 3.615L21 21.5l-.344-4.492Z"/></svg></button>
        <button class="action-btn"><svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
      <button class="action-btn save-btn ${p.saved ? 'saved' : ''}"><svg viewBox="0 0 24 24" stroke="currentColor">${p.saved ? bookmarkFilled : bookmarkOutline}</svg></button>
    </div>
    <div class="post-likes">${formatLikes(p.likes)} likes</div>
    <div class="post-caption"><span class="uname">${p.user}</span>${p.caption}</div>
    <a class="post-comments-link ${p.comments.length ? '' : 'hidden-link'}">View all ${p.comments.length} comments</a>
    <div class="comments-list" style="display:none;"></div>
    <div class="post-time">${p.time}</div>
    <div class="add-comment">
      <input type="text" placeholder="Add a comment...">
      <button>Post</button>
    </div>
  `;

  // Like button
  const likeBtn = wrap.querySelector('.like-btn');
  likeBtn.addEventListener('click', () => toggleLike(p, wrap));

  // Save button
  const saveBtn = wrap.querySelector('.save-btn');
  saveBtn.addEventListener('click', () => {
    p.saved = !p.saved;
    saveBtn.classList.toggle('saved', p.saved);
    saveBtn.querySelector('svg').innerHTML = p.saved ? bookmarkFilled : bookmarkOutline;
  });

  // Double-click to like on image
  const media = wrap.querySelector('.post-media');
  const heartPop = wrap.querySelector('.heart-pop');
  media.addEventListener('dblclick', () => {
    if(!p.liked){ toggleLike(p, wrap); }
    heartPop.classList.remove('animate');
    void heartPop.offsetWidth;
    heartPop.classList.add('animate');
  });

  // View comments toggle
  const commentsLink = wrap.querySelector('.post-comments-link');
  const commentsList = wrap.querySelector('.comments-list');
  function renderComments(){
    commentsList.innerHTML = p.comments.map(c => `<div class="comment-item"><span class="uname">${c.u}</span>${c.t}</div>`).join('');
  }
  commentsLink.addEventListener('click', () => {
    const showing = commentsList.style.display !== 'none';
    if(showing){
      commentsList.style.display = 'none';
      commentsLink.textContent = `View all ${p.comments.length} comments`;
    } else {
      renderComments();
      commentsList.style.display = 'block';
      commentsLink.textContent = 'Hide comments';
    }
  });

  // Add comment
  const input = wrap.querySelector('.add-comment input');
  const postBtn = wrap.querySelector('.add-comment button');
  input.addEventListener('input', () => {
    postBtn.classList.toggle('active', input.value.trim().length > 0);
  });
  function submitComment(){
    const val = input.value.trim();
    if(!val) return;
    p.comments.push({u:'jane_doe', t: val});
    input.value = '';
    postBtn.classList.remove('active');
    renderComments();
    commentsList.style.display = 'block';
    commentsLink.textContent = 'Hide comments';
    commentsLink.classList.remove('hidden-link');
  }
  postBtn.addEventListener('click', submitComment);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') submitComment(); });

  return wrap;
}

function toggleLike(p, wrap){
  p.liked = !p.liked;
  p.likes += p.liked ? 1 : -1;
  const likeBtn = wrap.querySelector('.like-btn');
  likeBtn.classList.toggle('liked', p.liked);
  likeBtn.querySelector('svg').innerHTML = p.liked ? heartFilled : heartOutline;
  wrap.querySelector('.post-likes').textContent = `${formatLikes(p.likes)} likes`;
}

posts.forEach(p => feed.appendChild(renderPost(p)));

/* ---------------- RENDER SUGGESTIONS ---------------- */
const suggestionsEl = document.getElementById('suggestions');
suggestedUsers.forEach(u => {
  const row = document.createElement('div');
  row.className = 'suggestion-row';
  row.innerHTML = `
    <img src="${u.avatar}">
    <div>
      <div class="sname">${u.name}</div>
      <div class="sreason">${u.reason}</div>
    </div>
    <button class="follow-btn">Follow</button>
  `;
  const btn = row.querySelector('.follow-btn');
  btn.addEventListener('click', () => {
    u.following = !u.following;
    btn.textContent = u.following ? 'Following' : 'Follow';
    btn.classList.toggle('following', u.following);
  });
  suggestionsEl.appendChild(row);
});
</script>
</body>
</html>
